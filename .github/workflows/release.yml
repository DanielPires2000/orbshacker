name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v2.1.0, v3.0.0, etc.

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get and validate tag
        id: tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

          echo "TAG_NAME=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Write version metadata
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.TAG_NAME }}"
          printf 'VERSION = "%s"\n' "${VERSION#v}" > orbshacker/_version.py

      - name: Build executable
        run: |
          pyinstaller --onefile --name orbshacker --console --add-data "settings.py;." --collect-all orbshacker orbshacker.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Orbshacker ${{ steps.tag.outputs.TAG_NAME }}
          body: |
            ## Orbshacker ${{ steps.tag.outputs.TAG_NAME }}
            
            ### Download
            Download `orbshacker.exe` below and run it. No Python required!
            
            ### What's new
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.TAG_NAME }}) for details.
          files: dist/orbshacker.exe
          draft: false
          prerelease: false
